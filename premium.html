<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Worksheets — KinderLingo Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script type="module" src="/auth-system/static/auth.js"></script>
<style>
:root{--blue:#4A90D9;--coral:#FF6B35;--teal:#4ECDC4;--dark:#1a1a2e;--bg:#f4f6fb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',Arial,sans-serif;background:var(--bg);color:var(--dark)}

nav{background:white;box-shadow:0 2px 8px rgba(0,0,0,.08);position:sticky;top:0;z-index:100;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
nav a.logo{font-family:'Fredoka One',cursive;font-size:1.3rem;text-decoration:none}
nav .k{color:var(--blue)}
nav .l{color:var(--coral)}
nav ul{display:flex;gap:6px;list-style:none;align-items:center}
nav ul a{padding:6px 14px;border-radius:8px;font-size:.88rem;font-weight:700;color:#555;font-family:'Nunito',Arial,sans-serif;transition:all .2s;text-decoration:none}
.nav-premium-btn{color:var(--teal)!important;font-weight:800!important}
.nav-user{font-size:.85rem;color:#888;padding:0 8px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-logout-btn:hover{color:#e05525!important}

.page{padding:48px 24px;max-width:1000px;margin:0 auto}

.hero{background:linear-gradient(135deg,#4ECDC4,#2D9CDB);border-radius:20px;padding:48px;text-align:center;color:white;margin-bottom:40px}
.hero h1{font-family:'Fredoka One',cursive;font-size:2rem;margin-bottom:10px;color:white}
.hero p{font-size:1rem;opacity:.88}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.card{background:white;border-radius:16px;overflow:hidden;border:2px solid #f0f0f0;transition:all .2s}
.card:hover{border-color:var(--teal);transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.card-img{height:120px;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,#f8f9fa,#e8f4f8)}
.card-body{padding:18px}
.card-body h3{font-family:'Fredoka One',cursive;font-size:1.05rem;margin-bottom:5px}
.card-body p{font-size:.83rem;color:#888;line-height:1.5}
.card-badge{background:var(--teal);color:white;font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:50px;display:inline-block;margin-bottom:8px}
.btn-dl{width:100%;margin-top:12px;padding:10px;border-radius:8px;border:none;font-weight:800;font-size:.88rem;cursor:pointer;background:var(--teal);color:white;font-family:'Nunito',Arial,sans-serif;transition:all .2s}
.btn-dl:hover{background:#3aabab}

@media(max-width:768px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo"><span class="k">Kinder</span><span class="l">Lingo</span></a>
  <ul id="nav-auth">
    <!-- Populated by auth.js -->
  </ul>
</nav>

<div class="page">
  <div id="content-area">
    <!-- Premium content loads here; paywall shown if not subscribed -->
  </div>
</div>

<script type="module">
import { isSubscriber, isLoggedIn, renderPaywall, updateNavAuthState } from '/auth-system/static/auth.js';

const WORKSHEETS = [
  { title: 'ABC Tracing Worksheets', desc: '26 pages of letter tracing for ages 3-6', emoji: '✏️', badge: 'Popular', pages: '26 pages' },
  { title: 'Numbers 1-20 Coloring', desc: 'Counting and coloring activities', emoji: '🔢', badge: null, pages: '20 pages' },
  { title: 'Colors & Shapes Pack', desc: 'Learn 12 colors and 8 shapes', emoji: '🎨', badge: null, pages: '30 pages' },
  { title: 'Farm Animals Flashcards', desc: '8 farm animals with tracing & coloring', emoji: '🐄', badge: 'New', pages: '16 pages' },
  { title: 'Body Parts Activities', desc: 'Label, trace, and color body parts', emoji: '👋', badge: null, pages: '14 pages' },
  { title: 'Food & Drink Vocabulary', desc: 'Match, trace, and draw food words', emoji: '🍎', badge: null, pages: '22 pages' },
];

async function init() {
  await updateNavAuthState();
  const subscriber = await isSubscriber();
  if (!subscriber) {
    renderPaywall('content-area');
    return;
  }
  // Render premium content
  document.getElementById('content-area').innerHTML = `
    <div class="hero">
      <h1>📝 Premium Worksheets</h1>
      <p>Download unlimited worksheets — printable, no ads, new packs added monthly!</p>
    </div>
    <div class="grid">
      ${WORKSHEETS.map(w => `
        <div class="card">
          <div class="card-img">${w.emoji}</div>
          <div class="card-body">
            ${w.badge ? `<span class="card-badge">${w.badge}</span>` : ''}
            <h3>${w.title}</h3>
            <p>${w.desc}</p>
            <p style="font-size:.78rem;color:#aaa;margin-top:6px">${w.pages}</p>
            <button class="btn-dl" onclick="alert('Download would start here!')">⬇️ Download PDF</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

init();
</script>
</body>
</html>
